---
# common.yml — Base setup for single-node Slurm + Docker cluster

- name: Common cluster setup
  hosts: cluster
  become: true
  tasks:

    # ── /etc/hosts ──────────────────────────────────────────────────────────
    - name: Set /etc/hosts for cluster DNS
      template:
        src: ../templates/hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: "0644"

    # ── System packages ─────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - munge
          - slurm-wlm
          - slurm-client
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - docker.io
        state: present

    # ── Munge ───────────────────────────────────────────────────────────────
    - name: Generate munge key
      command: dd if=/dev/urandom of=/etc/munge/munge.key bs=1 count=1024
      args:
        creates: /etc/munge/munge.key

    - name: Set munge key permissions
      file:
        path: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: "0400"

    - name: Enable and start munge
      systemd:
        name: munge
        state: restarted
        enabled: true

    # ── Slurm directories ──────────────────────────────────────────────────
    - name: Create Slurm directories
      file:
        path: "{{ item }}"
        state: directory
        owner: slurm
        group: slurm
        mode: "0755"
      loop:
        - /var/log/slurm
        - /var/spool/slurm
        - /var/spool/slurmd

    # ── Slurm config ─────────────────────────────────────────────────────
    - name: Deploy slurm.conf
      template:
        src: ../templates/slurm.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: "0644"

    - name: Deploy cgroup.conf
      template:
        src: ../templates/cgroup.conf.j2
        dest: /etc/slurm/cgroup.conf
        owner: slurm
        group: slurm
        mode: "0644"

    # ── Docker ──────────────────────────────────────────────────────────────
    - name: Add vagrant user to docker group
      user:
        name: vagrant
        groups: docker
        append: true

    - name: Enable and start Docker
      systemd:
        name: docker
        state: started
        enabled: true
