---
# deploy-monitoring.yml — Deploy Prometheus + Grafana + node_exporter + slurm-exporter

- name: Deploy monitoring stack
  hosts: master
  become: true
  vars:
    node_exporter_version: "1.7.0"
    prometheus_version: "2.51.0"
    grafana_version: "10.4.1"
  tasks:

    # ── node_exporter ───────────────────────────────────────────────────────
    - name: Check if node_exporter is installed
      stat:
        path: /usr/local/bin/node_exporter
      register: ne_bin

    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
      when: not ne_bin.stat.exists

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: true
      when: not ne_bin.stat.exists

    - name: Install node_exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: true
      when: not ne_bin.stat.exists

    - name: Create node_exporter systemd unit
      copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/node_exporter
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    # ── prometheus-slurm-exporter (Python) ────────────────────────────────
    - name: Deploy slurm-exporter script
      copy:
        src: ../monitoring/slurm_exporter.py
        dest: /usr/local/bin/slurm_exporter.py
        mode: "0755"

    - name: Create slurm-exporter systemd unit
      copy:
        dest: /etc/systemd/system/slurm-exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Slurm Exporter
          After=network.target slurmctld.service

          [Service]
          Type=simple
          ExecStart=/usr/bin/python3 /usr/local/bin/slurm_exporter.py --port 9092
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start slurm-exporter
      systemd:
        name: slurm-exporter
        state: started
        enabled: true
        daemon_reload: true

    # ── Prometheus ──────────────────────────────────────────────────────────
    - name: Create prometheus user
      user:
        name: prometheus
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create Prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: "0755"
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Check if prometheus is installed
      stat:
        path: /usr/local/bin/prometheus
      register: prom_bin

    - name: Download Prometheus
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: /tmp/prometheus.tar.gz
      when: not prom_bin.stat.exists

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp/
        remote_src: true
      when: not prom_bin.stat.exists

    - name: Install Prometheus binaries
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
        remote_src: true
      loop:
        - prometheus
        - promtool
      when: not prom_bin.stat.exists

    - name: Deploy prometheus.yml config
      copy:
        src: ../monitoring/prometheus.yml
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: "0644"
      notify: restart prometheus

    - name: Create prometheus systemd unit
      copy:
        dest: /etc/systemd/system/prometheus.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Monitoring
          After=network.target

          [Service]
          Type=simple
          User=prometheus
          Group=prometheus
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus \
            --storage.tsdb.retention.time=7d \
            --web.listen-address=:9090
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Start prometheus
      systemd:
        name: prometheus
        state: started
        enabled: true
        daemon_reload: true

    # ── Grafana ─────────────────────────────────────────────────────────────
    - name: Install Grafana dependencies
      apt:
        name:
          - adduser
          - libfontconfig1
          - musl
        state: present

    - name: Check if Grafana is installed
      stat:
        path: /usr/sbin/grafana-server
      register: gf_bin

    - name: Download Grafana deb
      get_url:
        url: "https://dl.grafana.com/oss/release/grafana_{{ grafana_version }}_amd64.deb"
        dest: /tmp/grafana.deb
      when: not gf_bin.stat.exists

    - name: Install Grafana deb
      apt:
        deb: /tmp/grafana.deb
        state: present
      when: not gf_bin.stat.exists

    - name: Deploy Grafana datasource provisioning
      copy:
        src: ../monitoring/grafana/provisioning/datasources/prometheus.yml
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
        owner: grafana
        group: grafana
        mode: "0644"
      notify: restart grafana

    - name: Deploy Grafana dashboard provisioning
      copy:
        src: ../monitoring/grafana/provisioning/dashboards/dashboards.yml
        dest: /etc/grafana/provisioning/dashboards/dashboards.yml
        owner: grafana
        group: grafana
        mode: "0644"
      notify: restart grafana

    - name: Create Grafana dashboards directory
      file:
        path: /var/lib/grafana/dashboards
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"

    - name: Deploy Grafana dashboard JSON
      copy:
        src: ../monitoring/grafana/dashboards/cluster-monitor.json
        dest: /var/lib/grafana/dashboards/cluster-monitor.json
        owner: grafana
        group: grafana
        mode: "0644"
      notify: restart grafana

    - name: Start Grafana
      systemd:
        name: grafana-server
        state: started
        enabled: true
        daemon_reload: true

    # ── Verification ────────────────────────────────────────────────────────
    - name: Wait for Prometheus to be ready
      uri:
        url: http://localhost:9090/-/ready
        status_code: 200
      register: prom_ready
      retries: 12
      delay: 5
      until: prom_ready.status == 200

    - name: Wait for Grafana to be ready
      uri:
        url: http://localhost:3000/api/health
        status_code: 200
      register: gf_ready
      retries: 12
      delay: 5
      until: gf_ready.status == 200

    - name: Wait for node_exporter to be ready
      uri:
        url: http://localhost:9100/metrics
        status_code: 200
        return_content: false
      register: ne_ready
      retries: 6
      delay: 3
      until: ne_ready.status == 200

    - name: Verify Prometheus targets
      uri:
        url: http://localhost:9090/api/v1/targets
        return_content: true
      register: prom_targets

    - name: Print Prometheus target status
      debug:
        msg: "Prometheus has {{ prom_targets.json.data.activeTargets | length }} active target(s)"

    - name: Print monitoring URLs
      debug:
        msg:
          - "Prometheus UI: http://192.168.56.10:9090"
          - "Grafana UI:    http://192.168.56.10:3000  (admin / admin)"
          - "node_exporter: http://192.168.56.10:9100/metrics"
          - "slurm_export:  http://192.168.56.10:9092/metrics"

  handlers:
    - name: restart prometheus
      systemd:
        name: prometheus
        state: restarted

    - name: restart grafana
      systemd:
        name: grafana-server
        state: restarted
