[master]
qml-node ansible_host=192.168.56.10

[compute]
qml-node ansible_host=192.168.56.10

[cluster:children]
master
compute

[cluster:vars]
ansible_user=vagrant
# If your workspace path contains spaces, create a symlink:
#   ln -s "$(pwd)/.vagrant/machines/qml-node/virtualbox/private_key" /tmp/qml-node-key
# Then use: ansible_ssh_private_key_file=/tmp/qml-node-key
ansible_ssh_private_key_file=.vagrant/machines/qml-node/virtualbox/private_key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
ansible_python_interpreter=/usr/bin/python3
